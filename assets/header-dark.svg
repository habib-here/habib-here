<svg width="880" height="240" viewBox="0 0 880 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="HABIB — security, systems, networks">
  <defs>
    <pattern id="dots" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#6e7681" opacity="0.45"/>
    </pattern>
  </defs>

  <!-- dotted field -->
  <rect width="880" height="240" fill="url(#dots)"/>

  <!-- panel: github dark canvas + border tones -->
  <rect x="28" y="28" width="824" height="184" fill="#0d1117" stroke="#3d444d" stroke-width="2"/>

  <!-- corner crosshairs -->
  <g stroke="#6e7681" stroke-width="1.5">
    <line x1="20" y1="28" x2="36" y2="28"/><line x1="28" y1="20" x2="28" y2="36"/>
    <line x1="844" y1="28" x2="860" y2="28"/><line x1="852" y1="20" x2="852" y2="36"/>
    <line x1="20" y1="212" x2="36" y2="212"/><line x1="28" y1="204" x2="28" y2="220"/>
    <line x1="844" y1="212" x2="860" y2="212"/><line x1="852" y1="204" x2="852" y2="220"/>
  </g>

  <!-- meta row -->
  <text x="52" y="64" font-family="'Courier New', Courier, monospace" font-size="12" letter-spacing="3" fill="#8b949e">[ 00 ] HABIB-HERE</text>

  <!-- inverted tag chip (top-right, flush with border) -->
  <rect x="744" y="29" width="107" height="26" fill="#e6edf3"/>
  <text x="797" y="46" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="bold" letter-spacing="2" fill="#0d1117">EST. 2022</text>

  <!-- wordmark (dx compensates trailing letter-spacing for true centering) -->
  <text x="440" y="138" dx="8" text-anchor="middle" font-family="Arial Black, Arial, Helvetica, sans-serif" font-weight="900" font-size="58" letter-spacing="16" fill="#e6edf3">HABIB_</text>

  <!-- rule -->
  <line x1="60" y1="158" x2="820" y2="158" stroke="#30363d" stroke-width="1"/>

  <!-- subtitle -->
  <text x="440" y="190" dx="2.5" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="14" letter-spacing="5" fill="#8b949e">// SECURITY :: SYSTEMS :: NETWORKS</text>
</svg>
