name: generate-snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: generate grayscale snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=#111111&color_dots=#e8e8e8,#c4c4c4,#9a9a9a,#5e5e5e,#1f1f1f
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#e8e8e8&color_dots=#1c1c1c,#363636,#5e5e5e,#8f8f8f,#cfcfcf

      - name: push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
